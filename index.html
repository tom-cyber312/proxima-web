<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proxima</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@11.11.17/dist/framer-motion.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.10/babel.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            borderRadius: { DEFAULT: '9999px' },
            fontFamily: {
              heading: ['"Instrument Serif"', 'serif'],
              body: ['Barlow', 'sans-serif'],
            },

      }
    </script>

  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback } = React;
      const { motion, AnimatePresence, useInView } = Motion;

      window.FadingVideo = function FadingVideo({ src, className, style }) {
        const [active, setActive] = useState(0);
        const [opacityA, setOpacityA] = useState(1);
        const [opacityB, setOpacityB] = useState(0);
        const refA = useRef(null);
        const refB = useRef(null);
        const rafRef = useRef(null);
        const fadeOutStart = useRef(0);
        const isFading = useRef(false);

        const FADE_MS = 500;
        const FADE_OUT_LEAD = 0.55;

        useEffect(() => {
          const vidA = refA.current;
          const vidB = refB.current;
          if (!vidA || !vidB) return;

          vidA.play().catch(() => {});

          const tick = (now) => {
            if (isFading.current) {
              const elapsed = now - fadeOutStart.current;
              const progress = Math.min(elapsed / FADE_MS, 1);
              const ease = progress * progress * (3 - 2 * progress);
              if (active === 0) {
                setOpacityA(1 - ease);
                setOpacityB(ease);
              } else {
                setOpacityA(ease);
                setOpacityB(1 - ease);
              }
              if (progress >= 1) {
                isFading.current = false;
                setActive((prev) => (prev === 0 ? 1 : 0));
              }
            }
            rafRef.current = requestAnimationFrame(tick);
          };

          rafRef.current = requestAnimationFrame(tick);

          return () => {
            if (rafRef.current) cancelAnimationFrame(rafRef.current);
          };
        }, [active]);

        useEffect(() => {
          const vids = [refA.current, refB.current];
          vids.forEach((vid, i) => {
            if (!vid) return;
            const handleEnded = () => {
              const duration = vid.duration;
              const startFade = duration * (1 - FADE_OUT_LEAD);
              const timeUntilFade = (startFade - vid.currentTime) * 1000;
              setTimeout(() => {
                if (!isFading.current) {
                  isFading.current = true;
                  fadeOutStart.current = performance.now();
                  const nextVid = i === 0 ? refB.current : refA.current;
                  if (nextVid) {
                    nextVid.currentTime = 0;
                    nextVid.play().catch(() => {});
                  }
                }
              }, Math.max(0, timeUntilFade));
            };
            vid.addEventListener('ended', handleEnded);
          });
        }, []);

        const videoProps = {
          autoPlay: true,
          loop: false,
          muted: true,
          playsInline: true,
          style: { width: '100%', height: '100%', objectFit: 'cover' },
        };

        return (
          <div className={className} style={{ ...style, position: 'relative', overflow: 'hidden' }}>
            <video ref={refA} {...videoProps} src={src} style={{ ...videoProps.style, position: 'absolute', top: 0, left: 0, opacity: opacityA }} />
            <video ref={refB} {...videoProps} src={src} style={{ ...videoProps.style, position: 'absolute', top: 0, left: 0, opacity: opacityB }} />
          </div>
        );
      };

      window.BlurText = function BlurText({ text, className, delay = 0, as: Tag = 'span' }) {
        const ref = useRef(null);
        const [visible, setVisible] = useState(false);

        useEffect(() => {
          const el = ref.current;
          if (!el) return;
          const observer = new IntersectionObserver(
            ([entry]) => { if (entry.isIntersecting) setVisible(true); },
            { threshold: 0.1 }
          );
          observer.observe(el);
          return () => observer.disconnect();
        }, []);

        const words = text.split(' ');
        return (
          <Tag ref={ref} className={className}>
            {words.map((word, i) => (
              <span
                key={i}
                className={`blur-text-word ${visible ? 'animate' : ''}`}
                style={{ animationDelay: `${delay + i * 0.06}s` }}
              >
                {word}&nbsp;
              </span>
            ))}
          </Tag>
        );
      };

      window.HeroSection = function HeroSection() {
        return (
          <section className="relative w-full h-screen overflow-hidden">
            <FadingVideo
              src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4"
              className="absolute inset-0 w-full h-full"
              style={{ transform: 'scale(1.2)', transformOrigin: 'top center' }}
            />
            <div className="relative z-10 flex flex-col justify-between h-full px-8 py-6 max-w-[1440px] mx-auto">
              <nav className="flex items-center justify-between">
                <span className="font-heading italic text-3xl tracking-tight">Proxima</span>
                <div className="hidden md:flex items-center gap-8 font-body text-sm text-white/70">
                  <a href="#" className="hover:text-white transition-colors">About</a>
                  <a href="#" className="hover:text-white transition-colors">Services</a>
                  <a href="#" className="hover:text-white transition-colors">Work</a>
                  <a href="#" className="hover:text-white transition-colors">Contact</a>
                  <button className="liquid-glass px-5 py-2 text-white text-sm hover:bg-white/10 transition-colors">
                    Get Started
                  </button>
                </div>
              </nav>

              <div className="flex-1 flex flex-col justify-center max-w-3xl">
                <motion.div
                  initial={{ opacity: 0, y: 20 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ duration: 0.8 }}
                >
                  <div className="liquid-glass inline-block px-4 py-1.5 rounded-full mb-6">
                    <span className="font-body text-xs tracking-widest uppercase text-white/80">Now Available</span>
                  </div>
                </motion.div>

                <BlurText
                  text="We craft digital experiences that transcend the ordinary"
                  as="h1"
                  className="font-heading italic text-5xl md:text-7xl lg:text-8xl leading-[0.95] mb-6"
                />

                <motion.p
                  initial={{ opacity: 0 }}
                  animate={{ opacity: 1 }}
                  transition={{ delay: 0.6, duration: 0.8 }}
                  className="font-body text-lg text-white/60 max-w-xl mb-10"
                >
                  Pushing the boundaries of what's possible in the digital frontier.
                  Strategy, design, and technology converging to shape the future.
                </motion.p>

                <motion.div
                  initial={{ opacity: 0, y: 10 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ delay: 0.8, duration: 0.6 }}
                  className="flex items-center gap-4"
                >
                  <button className="liquid-glass-strong px-8 py-3 font-body text-sm text-white flex items-center gap-2 hover:bg-white/10 transition-colors">
                    Start a Project
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      <path d="M7 17L17 7M17 7H7M17 7V17" />
                    </svg>
                  </button>
                  <button className="liquid-glass px-8 py-3 font-body text-sm text-white/80 flex items-center gap-2 hover:bg-white/10 transition-colors">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                      <polygon points="5,3 19,12 5,21" />
                    </svg>
                    Watch Reel
                  </button>
                </motion.div>
              </div>

              <div className="flex flex-col md:flex-row items-start md:items-end justify-between gap-8">
                <motion.div
                  initial={{ opacity: 0 }}
                  animate={{ opacity: 1 }}
                  transition={{ delay: 1.0, duration: 0.8 }}
                  className="flex gap-12"
                >
                  {[
                    { label: 'Projects Delivered', value: '200+' },
                    { label: 'Global Clients', value: '45+' },
                    { label: 'Awards Won', value: '18' },
                  ].map((stat) => (
                    <div key={stat.label}>
                      <div className="font-heading italic text-3xl text-white">{stat.value}</div>
                      <div className="font-body text-xs text-white/50 uppercase tracking-wider mt-1">{stat.label}</div>
                    </div>
                  ))}
                </motion.div>

                <motion.div
                  initial={{ opacity: 0 }}
                  animate={{ opacity: 1 }}
                  transition={{ delay: 1.2, duration: 0.8 }}
                  className="flex items-center gap-6"
                >
                  <span className="font-body text-xs text-white/40 uppercase tracking-wider">Trusted by</span>
                  <div className="flex gap-4 opacity-40">
                    {['Google', 'Apple', 'Meta', 'Netflix'].map((name) => (
                      <span key={name} className="font-body text-xs text-white">{name}</span>
                    ))}
                  </div>
                </motion.div>
              </div>
            </div>
          </section>
        );
      };

      window.CapabilitiesSection = function CapabilitiesSection() {
        const sectionRef = useRef(null);
        const isInView = useInView(sectionRef, { once: true, amount: 0.2 });

        const capabilities = [
          {
            icon: (
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12,6 12,12 16,14" />
              </svg>
            ),
            title: 'Strategy & Consulting',
            description: 'Data-driven insights and strategic frameworks that define the path forward for your digital presence.',
            tags: ['Research', 'Analytics', 'Roadmapping'],
          },
          {
            icon: (
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                <circle cx="12" cy="12" r="10" />
                <line x1="2" y1="12" x2="22" y2="12" />
                <path d="M12,2a15.3,15.3,0,0,1,4,10,15.3,15.3,0,0,1-4,10,15.3,15.3,0,0,1-4-10A15.3,15.3,0,0,1,12,2Z" />
              </svg>
            ),
            title: 'Design & Development',
            description: 'End-to-end product design and engineering, from concept to deployment with pixel-perfect precision.',
            tags: ['UI/UX', 'Frontend', 'Backend'],
          },
          {
            icon: (
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                  <circle cx="8.5" cy="8.5" r="1.5" />
                  <polyline points="21,15 16,10 5,21" />
                </svg>
            ),
            title: 'Creative Production',
            description: 'Captivating visual storytelling through motion, imagery, and immersive brand experiences.',
            tags: ['Video', '3D', 'Branding'],
          },
        ];

        return (
          <section ref={sectionRef} className="relative w-full min-h-screen overflow-hidden">
            <FadingVideo
              src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_094631_d30ab262-45ee-4b7d-99f3-5d5848c8ef13.mp4"
              className="absolute inset-0 w-full h-full"
              style={{ objectFit: 'cover' }}
            />
            <div className="relative z-10 flex flex-col justify-center h-full min-h-screen px-8 py-24 max-w-[1440px] mx-auto">
              <motion.div
                initial={{ opacity: 0, y: 30 }}
                animate={isInView ? { opacity: 1, y: 0 } : {}}
                transition={{ duration: 0.8 }}
                className="mb-16"
              >
                <span className="font-body text-xs tracking-widest uppercase text-white/50 block mb-4">What We Do</span>
                <h2 className="font-heading italic text-4xl md:text-6xl lg:text-7xl leading-[0.95] max-w-3xl">
                  Capabilities built for the next era
                </h2>
              </motion.div>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {capabilities.map((cap, i) => (
                  <motion.div
                    key={cap.title}
                    initial={{ opacity: 0, y: 40 }}
                    animate={isInView ? { opacity: 1, y: 0 } : {}}
                    transition={{ duration: 0.6, delay: 0.2 + i * 0.15 }}
                    className="liquid-glass-strong p-8 flex flex-col gap-6 hover:bg-white/[0.08] transition-colors"
                  >
                    <div className="text-white/60">{cap.icon}</div>
                    <h3 className="font-heading italic text-2xl text-white">{cap.title}</h3>
                    <p className="font-body text-sm text-white/50 leading-relaxed flex-1">{cap.description}</p>
                    <div className="flex flex-wrap gap-2 mt-auto">
                      {cap.tags.map((tag) => (
                        <span key={tag} className="liquid-glass px-3 py-1 font-body text-xs text-white/60">
                          {tag}
                        </span>
                      ))}
                    </div>
                  </motion.div>
                ))}
              </div>
            </div>
          </section>
        );
      };

      window.App = function App() {
        return (
          <div className="bg-black min-h-screen">
            <HeroSection />
            <CapabilitiesSection />
          </div>
        );
      };
    </script>

    <script type="text/babel">
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
